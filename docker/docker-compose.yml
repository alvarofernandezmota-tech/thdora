# THDORA — Docker Compose
# Fase 10: orquestación de servicios

version: "3.9"

services:
  thdora-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../datos:/app/datos
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

