# Configuración Prometheus para THDORA
# Scraping cada 15s desde la app (endpoint /metrics)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: thdora
    static_configs:
      - targets:
          - thdora:8000
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
