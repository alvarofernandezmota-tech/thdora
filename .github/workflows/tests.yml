name: CI — Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run pytest suite

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with dummy credentials
        env:
          TELEGRAM_BOT_TOKEN: test_token_ci
          GROQ_API_KEY: test_groq_key_ci
          GITHUB_TOKEN: test_github_token_ci
        run: |
          pytest --tb=short -q

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.OWNER_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *Tests THDORA fallidos en CI*
            Rama: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
