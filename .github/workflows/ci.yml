name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/ scripts/ --output-format=github

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    env:
      TELEGRAM_TOKEN: "0:dummy_token_for_tests"
      THDORA_API_URL: "http://localhost:8000"
      SECRET_KEY: "test_secret_key_32_chars_minimum!"
      DATABASE_URL: "sqlite:///./data/test.db"
      ALLOWED_USER_ID: "123456789"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run autotest (imports + firmas)
        run: python scripts/autotest.py --fast

      - name: Run pytest
        run: |
          pytest tests/ -v \
            --asyncio-mode=auto \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false
