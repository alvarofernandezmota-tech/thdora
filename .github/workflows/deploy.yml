name: CI/CD — thdora

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Tests ──────────────────────────────────────────────────────────
  test:
    name: Tests & cobertura
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Ejecutar tests con cobertura
        run: pytest --cov=src --cov-fail-under=75 --cov-report=term-missing

  # ── Job 2: Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy a servidor Madre
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/thdora
            git pull
            docker compose up --build -d

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl --fail --retry 3 --retry-delay 5 http://localhost:8000/health

      # ── Auto-commit doc de sesión ────────────────────────────────────────
      - name: Auto-doc sesión en repo
        run: |
          git config user.name "thdora-bot"
          git config user.email "bot@thdora.dev"
          FECHA=$(date '+%Y-%m-%d')
          HORA=$(date '+%H:%M')
          ARCHIVO="docs/sesiones/${FECHA}.md"
          mkdir -p docs/sesiones
          cat >> "$ARCHIVO" << EOF

          ## Deploy ${FECHA} ${HORA} — commit ${{ github.sha }}
          - Autor: ${{ github.actor }}
          - Mensaje: ${{ github.event.head_commit.message }}
          - Estado: ✅ Deploy exitoso
          EOF
          git add docs/sesiones/
          git commit -m "docs: auto-deploy ${FECHA} ${HORA}" || echo "Sin cambios"
          git push

      # ── Notificación Google Drive vía webhook ────────────────────────────
      - name: Notificar Google Drive (webhook)
        if: success() && secrets.GDRIVE_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.GDRIVE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "fecha": "'$(date '+%Y-%m-%d %H:%M')'",
              "commit": "${{ github.sha }}",
              "autor": "${{ github.actor }}",
              "mensaje": "${{ github.event.head_commit.message }}",
              "estado": "deploy_exitoso"
            }'

      # ── Notificaciones Telegram ──────────────────────────────────────────
      - name: Notificación Telegram — éxito
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.OWNER_CHAT_ID }}" \
            -d text="✅ Deploy thdora exitoso — ${{ github.event.head_commit.message }} (${{ github.sha }})"

      - name: Notificación Telegram — fallo
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.OWNER_CHAT_ID }}" \
            -d text="❌ Deploy thdora FALLIDO — ${{ github.event.head_commit.message }}. Revisa los logs."
