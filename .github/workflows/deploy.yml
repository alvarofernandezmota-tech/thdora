name: CI/CD — thdora

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests & cobertura
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Ejecutar tests con cobertura
        run: pytest --cov=src --cov-fail-under=75 --cov-report=term-missing

  deploy:
    name: Deploy a servidor Madre
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/thdora
            git pull
            docker compose up --build -d

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl --fail --retry 3 --retry-delay 5 http://localhost:8000/health

      - name: Notificación Telegram — éxito
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.OWNER_CHAT_ID }}" \
            -d text="✅ Deploy thdora exitoso — commit ${{ github.sha }} en main"

      - name: Notificación Telegram — fallo
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.OWNER_CHAT_ID }}" \
            -d text="❌ Deploy thdora FALLIDO — commit ${{ github.sha }}. Revisa los logs."
