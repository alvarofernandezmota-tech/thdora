# THDORA — docker-compose.yml
services:
  api:
    build: .
    image: thdora:latest
    container_name: thdora-api
    command: /entrypoint-api.sh
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - thdora_data:/app/data
    env_file:
      - .env
    environment:
      THDORA_DB_PATH=/app/data/thdora.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    image: thdora:latest
    container_name: thdora-bot
    command: /entrypoint-bot.sh
    restart: always
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - thdora_data:/app/data
    env_file:
      - .env
    environment:
      - THDORA_API_URL=http://api:8000
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*bot"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  thdora_data:
    driver: local
