# THDORA v0.21.2 — Stack completo: api + bot + Prometheus + Grafana
# Arrancar: docker compose up -d
# API:       http://localhost:8000
# Métricas:  http://localhost:9090
# Grafana:   http://localhost:3000  (admin/admin)

services:

  # ── API ──────────────────────────────────────────────────────────────────────────
  thdora:
    build: .
    container_name: thdora
    restart: unless-stopped
    command: ["/entrypoint-api.sh"]
    user: "1000:1000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import urllib.request, sys
          try:
              r = urllib.request.urlopen('http://localhost:8000/health/live', timeout=5)
              sys.exit(0 if r.status == 200 else 1)
          except Exception as e:
              print(e); sys.exit(1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      - prometheus

  # ── Bot ──────────────────────────────────────────────────────────────────────────
  bot:
    build: .
    container_name: thdora-bot
    restart: unless-stopped
    command: ["/entrypoint-bot.sh"]
    user: "1000:1000"
    env_file:
      - .env
    environment:
      THDORA_API_URL: "http://thdora:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      thdora:
        condition: service_healthy

  # ── Prometheus ─────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ── Grafana ────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
